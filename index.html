<!doctype html>
<html lang="en" class="no-scrollbar">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" id="iconLink" href='Ely514.svg' />
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const iconLink = document.getElementById('iconLink');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      prefersDark ? iconLink.setAttribute('href', 'Ely514.svg') : iconLink.setAttribute('href', 'Ely514_accent.svg');

      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Indie+Flower&family=Julius+Sans+One&display=swap"
    rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ely</title>
</head>

<body class="no-scrollbar">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
